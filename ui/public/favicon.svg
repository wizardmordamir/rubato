<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed rounded square so the mark fills a 16px favicon. Violet is
       rubato's brand accent (distinct from the sibling app's emerald). -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Bold eighth note ("rubato" is a musical term), drawn thick so the head,
       stem and flag all survive downscaling to 16px. -->
  <g fill="#ffffff">
    <!-- stem -->
    <rect x="300" y="120" width="34" height="248" rx="6"/>
    <!-- flag off the top of the stem -->
    <path d="M334 120
             C 334 120, 420 150, 410 240
             C 404 200, 372 178, 334 178 Z"/>
    <!-- note head: a tilted oval -->
    <ellipse cx="222" cy="372" rx="78" ry="58" transform="rotate(-24 222 372)"/>
  </g>
</svg>
